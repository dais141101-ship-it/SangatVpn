<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS VPN 3D Neon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#050014;
    color:white;
}

/* background neon */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00ffff;
    filter:blur(150px);
    opacity:.5;
    top:-100px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ff00ff;
    filter:blur(150px);
    opacity:.5;
    bottom:-100px;
    right:-100px;
}


.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
}


.card{
    width:330px;
    padding:40px 25px;
    border-radius:25px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);

    border:1px solid rgba(0,255,255,.5);

    box-shadow:
    0 0 20px #00ffff,
    inset 0 0 30px rgba(255,0,255,.3);

    transform:perspective(800px)
    rotateX(8deg);
}


.logo{
    font-size:45px;
    font-weight:bold;

    color:#00ffff;

    text-shadow:
    0 0 10px #00ffff,
    0 0 30px #ff00ff;

    margin-bottom:20px;
}


.text{
    color:#ddd;
    margin-bottom:30px;
}


button{

    padding:15px 45px;
    border:none;
    border-radius:50px;

    background:#00ffff;
    color:#000;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:
    0 0 20px #00ffff;

    transition:.3s;
}


button:hover{

    transform:scale(1.1);

    background:#ff00ff;

    box-shadow:
    0 0 40px #ff00ff;
}


.circle{

    width:120px;
    height:120px;

    margin:0 auto 20px;

    border-radius:50%;

    border:5px solid #00ffff;

    box-shadow:
    0 0 30px #00ffff,
    inset 0 0 30px #ff00ff;

    animation:spin 5s linear infinite;
}


@keyframes spin{

from{
transform:rotateY(0deg);
}

to{
transform:rotateY(360deg);
}

}

</style>

</head>


<body>


<section class="hero">

<div class="card">

<div class="circle"></div>

<div class="logo">
NEXUS VPN
</div>

<div class="text">
FAST • SECURE • PREMIUM<br>
3D NEON NETWORK
</div>


<button>
CONNECT
</button>


</div>

</section>


</body>
</html>
